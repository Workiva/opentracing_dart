name: CI

on:
  pull_request:
  push:
    branches:
      - 'master'

jobs:
  checks:
    uses: Workiva/gha-dart-oss/.github/workflows/checks.yaml@v0.1.14
  build:
    uses: Workiva/gha-dart-oss/.github/workflows/build.yaml@v0.1.14
  test:
    runs-on: ubuntu-latest
    name: Unit Tests
    strategy:
      matrix:
        sdk: [ '2.19.6','stable' ]
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ matrix.sdk }}
      - run: dart pub get
      - run: dart test
